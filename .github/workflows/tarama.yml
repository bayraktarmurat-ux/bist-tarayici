name: BIST Aksam Tarama

on:
  schedule:
    - cron: '0 16 * * 1-5'  # Hafta içi 19:00 TSI (16:00 UTC)
  workflow_dispatch:         # Manuel calistirma butonu

jobs:
  tara:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Kutuphaneler Kur
        run: pip install yfinance pandas requests

      - name: Tarama Calistir
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bist_telegram.py
